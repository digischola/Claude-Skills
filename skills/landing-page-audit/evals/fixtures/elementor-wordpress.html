<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fixture: Elementor on WordPress</title>
<link rel="stylesheet" href="/wp-content/plugins/elementor/assets/css/frontend.min.css">
<link rel="stylesheet" href="/wp-content/themes/hello-elementor/style.min.css?ver=3.1.1">
<script src="/wp-includes/js/wp-emoji-release.min.js"></script>
</head>
<body class="elementor-kit-12 wp-singular">
<header class="elementor-location-header">
  <div class="elementor-widget-container">
    <nav><a href="/">Home</a> · <a href="/about">About</a> · <a href="/contact">Contact</a></nav>
  </div>
</header>
<main class="elementor elementor-8">
  <section class="elementor-section elementor-top-section">
    <div class="elementor-container">
      <div class="elementor-column elementor-col-100">
        <div class="elementor-widget-wrap">
          <div class="elementor-widget elementor-widget-heading">
            <div class="elementor-widget-container">
              <h1>Local Service Business</h1>
            </div>
          </div>
          <div class="elementor-widget elementor-widget-text-editor">
            <div class="elementor-widget-container">
              <p>We serve customers in the local area with quality service.</p>
            </div>
          </div>
          <div class="elementor-widget elementor-widget-button">
            <div class="elementor-widget-container">
              <a class="elementor-button" href="/contact">Contact Us</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
  <section class="elementor-section elementor-top-section elementor-section-below-hero">
    <div class="elementor-container">
      <div class="elementor-widget-wrap">
        <p>Below the hero — Chrome MCP internal screenshot typically renders this section as blank cream background due to nested widget rendering in headless mode.</p>
      </div>
    </div>
  </section>
</main>
<footer class="site-footer">
  <p>&copy; 2026</p>
</footer>
</body>
</html>
