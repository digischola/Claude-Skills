<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fixture: React SPA with CountUp + scroll-reveal</title>
<meta property="og:image" content="https://storage.googleapis.com/gpt-engineer-file-uploads/abc123/hero.webp">
<script type="module" crossorigin src="/assets/index-ABC123.js"></script>
<link rel="stylesheet" crossorigin href="/assets/index-DEF456.css">
<style>
  .reveal { opacity: 0; transform: translateY(20px); transition: opacity 0.6s ease, transform 0.6s ease; }
  .reveal.in-view { opacity: 1; transform: translateY(0); }
  .stat-number { font-size: 48px; font-weight: 700; color: #f1c66e; }
</style>
</head>
<body>
<div id="root">
  <section id="hero" class="reveal">
    <h1>Śrī Nṛsiṁha Caturdaśī 2026</h1>
    <img src="https://cdn.example.com/hero.webp" alt="Hero" loading="lazy">
  </section>
  <section id="stats" class="reveal stats-section">
    <div class="stat-item">
      <span class="stat-number" data-count="50">0</span><span class="stat-suffix">+</span>
      <div class="stat-label">Years of Service</div>
    </div>
    <div class="stat-item">
      <span class="stat-number" data-count="500">0</span><span class="stat-suffix">+</span>
      <div class="stat-label">Expected Attendees</div>
    </div>
    <div class="stat-item">
      <span class="stat-number" data-count="10">0</span><span class="stat-suffix">+</span>
      <div class="stat-label">Cultural Programmes</div>
    </div>
    <div class="stat-item">
      <span class="stat-number" data-count="30">0</span><span class="stat-suffix">+</span>
      <div class="stat-label">Festivals Celebrated Yearly</div>
    </div>
  </section>
</div>
<script>
  // CountUp shim — increments stat numbers when section enters viewport
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('in-view');
        e.target.querySelectorAll('[data-count]').forEach(el => {
          const target = parseInt(el.getAttribute('data-count'));
          let current = 0;
          const step = target / 60;
          const tick = () => {
            current = Math.min(current + step, target);
            el.textContent = Math.floor(current);
            if (current < target) requestAnimationFrame(tick);
          };
          requestAnimationFrame(tick);
        });
      }
    });
  }, { threshold: 0.3 });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
</script>
</body>
</html>
