<!--
  Component: mockups/browser-chrome
  Wraps any content in a realistic Safari or Chrome window frame.
  Use to make LP mockups, web dashboards, product tours look like real browser screenshots.

  Inputs:
    {{ID}}            - unique suffix
    {{START}}         - data-start seconds
    {{DURATION}}      - data-duration seconds
    {{TRACK}}         - data-track-index
    {{STYLE}}         - "safari" | "chrome" (visual style)
    {{URL}}           - URL text in the address bar (e.g. "digischola.in" or "acme.co/pricing")
    {{TITLE}}         - tab title (short, e.g. "Acme — Pricing")
    {{THEME}}         - "light" | "dark" — browser chrome theme
    {{CHILD_HTML}}    - inner content HTML (the page that sits inside the browser frame)
    {{SCROLL_Y_FROM}} - starting scroll y for inner content (px, usually 0)
    {{SCROLL_Y_TO}}   - ending scroll y for inner content (negative px for scroll-down, e.g. -800)

  Behavior: frame fades in, inner content scrolls from SCROLL_Y_FROM to SCROLL_Y_TO over the duration.
  Use with {{SCROLL_Y_TO}} = 0 for static display, or negative for scrolling.
-->

<div
  id="chrome-{{ID}}"
  class="clip browser-chrome browser-chrome-{{STYLE}} browser-chrome-theme-{{THEME}}"
  data-start="{{START}}"
  data-duration="{{DURATION}}"
  data-track-index="{{TRACK}}"
  style="position: absolute; inset: 40px; border-radius: 20px; overflow: hidden;
         background: {{BG_COLOR}};
         box-shadow: 0 40px 120px rgba(0,0,0,0.55), 0 12px 40px rgba(0,0,0,0.35);
         z-index: 14;
         border: 1px solid {{BORDER_COLOR}};
         will-change: opacity, transform;"
>
  <!-- Chrome bar -->
  <div
    class="chrome-bar-{{ID}}"
    style="position: absolute; top: 0; left: 0; right: 0; height: 92px;
           background: {{BAR_COLOR}};
           border-bottom: 1px solid {{BORDER_COLOR}};
           display: flex; align-items: center; padding: 0 24px; gap: 18px;
           z-index: 2;"
  >
    <!-- Traffic lights (Safari-style macOS) -->
    <div style="display: flex; gap: 10px;">
      <div style="width: 16px; height: 16px; border-radius: 50%; background: #FF5F57;"></div>
      <div style="width: 16px; height: 16px; border-radius: 50%; background: #FEBC2E;"></div>
      <div style="width: 16px; height: 16px; border-radius: 50%; background: #28C840;"></div>
    </div>

    <!-- Back/forward arrows (light) -->
    <div style="display: flex; gap: 12px; margin-left: 8px; color: {{ICON_COLOR}};">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
    </div>

    <!-- URL bar -->
    <div
      style="flex: 1; height: 52px; background: {{URL_BG}};
             border-radius: 12px;
             display: flex; align-items: center; padding: 0 20px; gap: 10px;
             font-family: 'Inter', -apple-system, system-ui, sans-serif;
             font-size: 22px; color: {{TEXT_COLOR}};
             border: 1px solid {{BORDER_COLOR}};"
    >
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="{{ICON_COLOR}}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <span style="font-weight: 500;">{{URL}}</span>
    </div>

    <!-- Reload icon -->
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="{{ICON_COLOR}}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="margin-left: 8px;">
      <polyline points="23 4 23 10 17 10"/>
      <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
    </svg>
  </div>

  <!-- Viewport -->
  <div
    class="chrome-viewport-{{ID}}"
    style="position: absolute; top: 92px; left: 0; right: 0; bottom: 0; overflow: hidden; background: {{PAGE_BG}};"
  >
    <div class="chrome-page-{{ID}}" style="position: absolute; top: 0; left: 0; right: 0; width: 100%; transform: translateY(0px);">
      {{CHILD_HTML}}
    </div>
  </div>
</div>

<script>
(function() {
  var tl = (window.__timelines && window.__timelines["main"]) || null;
  if (!tl) return;

  var START = {{START}};
  var DURATION = {{DURATION}};
  var SCROLL_FROM = {{SCROLL_Y_FROM}};
  var SCROLL_TO = {{SCROLL_Y_TO}};

  /* Frame entrance with subtle scale for weight */
  tl.from(
    "#chrome-{{ID}}",
    { opacity: 0, scale: 0.96, y: 20, duration: 0.45, ease: "power3.out" },
    START + 0.02
  );

  /* Page scrolling inside the chrome viewport */
  if (SCROLL_FROM !== SCROLL_TO) {
    tl.fromTo(
      ".chrome-page-{{ID}}",
      { y: SCROLL_FROM },
      { y: SCROLL_TO, duration: DURATION - 0.6, ease: "power1.inOut" },
      START + 0.25
    );
  }

  /* Fade out before clip end */
  tl.to(
    "#chrome-{{ID}}",
    { opacity: 0, duration: 0.3, ease: "power2.in", overwrite: "auto" },
    START + DURATION - 0.32
  );
})();
</script>

<!--
  Theme color tokens — the injector replaces these placeholder vars at render time.
  For SAFARI+LIGHT theme, defaults are:
    {{BG_COLOR}}     = #FFFFFF
    {{BAR_COLOR}}    = #F5F5F7
    {{BORDER_COLOR}} = #D1D5DB
    {{URL_BG}}       = #FFFFFF
    {{TEXT_COLOR}}   = #1F2937
    {{ICON_COLOR}}   = #6B7280
    {{PAGE_BG}}      = #FFFFFF

  For SAFARI+DARK theme:
    {{BG_COLOR}}     = #1C1C1E
    {{BAR_COLOR}}    = #2C2C2E
    {{BORDER_COLOR}} = #3A3A3C
    {{URL_BG}}       = #3A3A3C
    {{TEXT_COLOR}}   = #F5F5F7
    {{ICON_COLOR}}   = #8E8E93
    {{PAGE_BG}}      = #1C1C1E
-->
